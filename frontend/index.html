<!DOCTYPE html>
<html lang="en" style="scroll-behavior: smooth;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect to image + font origins. The DNS+TLS round-trip
         for fonts.googleapis.com / fonts.gstatic.com blocks the
         first paint when fonts aren't preconnect-ed, causing FOUT. -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload the global webfont CSS so the browser fetches it
         in parallel with the rest of the head, before it sees the
         @import in index.css. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Advent+Pro:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&family=Caveat:wght@400..700&display=swap" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Advent+Pro:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&family=Caveat:wght@400..700&display=swap"
    />

    <title>Eugene Odibenuah | Full-Stack Web Developer</title>
    <meta name="description" content="Portfolio of Eugene Odibenuah, a Nigerian full-stack developer building fast, scalable web apps." />

    <!-- OG / Social Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Eugene Odibenuah | Full-Stack Web Developer" />
    <meta property="og:description" content="Portfolio of Eugene Odibenuah — premium full-stack developer specialized in enterprise-grade web applications." />
    <meta property="og:url" content="https://buildwithlami.dev" />
    <meta property="og:site_name" content="BuildWithLami" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Eugene Odibenuah | Full-Stack Web Developer" />
    <meta name="twitter:description" content="Portfolio of Eugene Odibenuah — premium full-stack developer specialized in enterprise-grade web applications." />
    <link rel="canonical" href="https://buildwithlami.dev" />

    <!-- Instant theme restore — prevents white flash for dark mode users -->
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        if (saved === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (!saved) {
          var hour = new Date().getHours();
          if (hour < 6 || hour >= 18) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
