    <!-- Instant theme restore — prevents white flash for dark mode users -->
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        if (saved === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (!saved) {
          var hour = new Date().getHours();
          if (hour < 6 || hour >= 18) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
